services:
  - type: web
    name: aurascore-api
    env: docker
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./aurascore.db
      - key: JWT_SECRET
        generateValue: true         # Render auto-generates a secure value
      - key: GMAIL_USER
        sync: false                 # Set manually in Render dashboard
      - key: GMAIL_APP_PASSWORD
        sync: false                 # Set manually in Render dashboard
