services:
  - type: web
    name: aurascore-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./aurascore.db
      - key: PYTHON_VERSION
        value: 3.10.0
